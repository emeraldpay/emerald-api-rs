name: Test

on:
  push:
    branches:
      - master
      - release/*
      - ci/*
  pull_request:
    branches:
      - master

jobs:
  tests:
    name: Test ${{ matrix.os }}
    strategy:
      matrix:
        os: [ "windows-latest", "macos-latest", "ubuntu-latest" ]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout the code
        uses: actions/checkout@v5

      - name: Install Rust
        run: rustup toolchain add --profile=minimal stable

      - name: Test
        run: cargo test --all --release
        env:
          RUST_BACKTRACE: "1"